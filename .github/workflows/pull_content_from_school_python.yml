name: Copy files from school_classwork_python to quantum404ak.github.io

on:
  push:
    branches:
      - main   # trigger when you push to main in school_classwork_python

jobs:
  copy-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository (school_classwork_python)
        uses: actions/checkout@v3
        with:
          repository: Quantum404AK/school_classwork_python
          token: ${{ secrets.API_TOKEN_GITHUB }}
          ref: main   # adjust if your source repo uses a different branch

      - name: List repo contents (debug)
        run: ls -R

      - name: Copy files to destination repository
        uses: lubu12/copy-files-to-repository@v1
        with:
          source-files: index.html styles.css files
          destination-username: Quantum404AK
          destination-repository: quantum404ak.github.io
          destination-branch: main
          destination-directory: projects/school_classwork_python
          commit-username: github-actions
          commit-email: ${{ github.actor }}@users.noreply.github.com
          commit-message: "Automated copy from ORIGIN_COMMIT"
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
